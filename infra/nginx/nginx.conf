# Complete NovaPay API Gateway - Hardened For Microservice DNS Resolution
server {
    # Listen On Port 8080 For All Incoming Client Traffic
    listen 8080;

    # Internal Docker DNS Resolver (Required For Dynamic Variable Resolution)
    resolver 127.0.0.11 valid=30s;

    # Gateway Root Health Check Endpoint For Load Balancer Liveness Probes
    location = / {
        return 200 "NovaPay API Gateway Is Active!";
        add_header Content-Type text/plain;
    }

    # Account Service Mapping - Proxies /accounts/foo to /foo
    location /accounts/ {
        set $upstream_account account-service;
        rewrite ^/accounts/(.*) /$1 break;
        proxy_pass http://$upstream_account:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Transaction Service Mapping - Proxies /transactions/foo to /foo
    location /transactions/ {
        set $upstream_trans transaction-service;
        rewrite ^/transactions/(.*) /$1 break;
        proxy_pass http://$upstream_trans:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Ledger Service Mapping - Proxies /ledger/foo to /foo
    location /ledger/ {
        set $upstream_ledger ledger-service;
        rewrite ^/ledger/(.*) /$1 break;
        proxy_pass http://$upstream_ledger:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # FX Service Mapping - Proxies /fx/foo to /foo
    location /fx/ {
        set $upstream_fx fx-service;
        rewrite ^/fx/(.*) /$1 break;
        proxy_pass http://$upstream_fx:3006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Payroll Service Mapping - Proxies /payroll/foo to /foo
    location /payroll/ {
        set $upstream_payroll payroll-service;
        rewrite ^/payroll/(.*) /$1 break;
        proxy_pass http://$upstream_payroll:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin Service Mapping - Proxies /admin/foo to /foo
    location /admin/ {
        set $upstream_admin admin-service;
        rewrite ^/admin/(.*) /$1 break;
        proxy_pass http://$upstream_admin:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
